<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            font-size: 28px;
            color: #333333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .register-header p {
            font-size: 14px;
            color: #666666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #444444;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #357abd;
        }
        
        .your-button-class {
            display: block;
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        .your-button-class:hover,
        .your-button-class:visited,
        .your-button-class:active {
            color: white;
            text-decoration: none;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666666;
        }

        .login-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-header">
            <h1>สร้างบัญชีใหม่</h1>
            <p>กรอกข้อมูลด้านล่างเพื่อเริ่มใช้งานระบบ</p>
        </div>

        <form action="register.php" method="POST">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" name="username" placeholder="ตั้งชื่อผู้ใช้ของคุณ" required>
            </div>

            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" placeholder="อย่างน้อย 8 ตัวอักษร" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">ยืนยันรหัสผ่าน (Confirm Password)</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
            </div>

            <button type="submit" class="btn-register">สมัครสมาชิก</button>
        </form>

        <a href="index.html" class="your-button-class">ย้อนกลับ</a>

        <div class="login-link">
            มีบัญชีอยู่แล้วใช่ไหม? <a href="#">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>

</body>
</html>
